name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Path filter ──────────────────────────────────────────────────────────────
  # Detects which categories of files changed so downstream jobs can skip
  # themselves on docs-only PRs, satisfying required status checks instantly
  # rather than waiting on runner-queue availability.
  #
  # GitHub treats a skipped job as "passing" for branch-protection purposes,
  # so docs-only PRs get a green check in ~10 s with no runner cost.
  filter:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      migrations: ${{ steps.filter.outputs.migrations }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2 # enough history for push-event diffing

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            # True when any non-docs file changed (triggers full CI suite).
            # Negation patterns exclude docs-only files; everything else is code.
            code:
              - '**'
              - '!**.md'
              - '!docs/**'
              - '!CLAUDE.md'
              - '!.gitignore'
              - '!LICENSE*'
            # True only when migration files changed (triggers smoke test).
            migrations:
              - 'supabase/migrations/**'

  # ── Main CI ──────────────────────────────────────────────────────────────────
  ci:
    name: Type check · Lint · Test · Build
    needs: filter
    if: needs.filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Quality gates ────────────────────────────────────────────────────────

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      # ── Tests ────────────────────────────────────────────────────────────────

      - name: Run tests with coverage
        run: npm run test:coverage

      # ── Build ────────────────────────────────────────────────────────────────

      - name: Build
        run: npm run build
        env:
          # Add any required build-time env vars here (use GitHub Secrets)
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # ── Migration smoke test ───────────────────────────────────────────────────
  # Runs on PRs that touch supabase/migrations/**. Installs the Supabase CLI,
  # links to the project, and applies pending migrations to the preview branch
  # provisioned by the Supabase GitHub App when the PR was opened.
  # Skipped automatically on PRs with no migration changes.
  #
  # Branch lifecycle (automatic — no manual steps required):
  #   PR opened/updated → Supabase GitHub App provisions preview branch
  #   This job → applies pending migrations to that branch
  #   PR merged/closed → Supabase GitHub App tears down the preview branch

  migration-smoke-test:
    name: Migration smoke test
    needs: filter
    if: github.event_name == 'pull_request' && needs.filter.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Applies any pending migrations to the preview branch for this PR.
      # Supabase CLI detects the current git branch (via GITHUB_HEAD_REF) and
      # routes the push to the corresponding Supabase preview branch — not main.
      - name: Apply pending migrations to preview branch
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      # Confirm no local migrations are out of sync after the push.
      - name: Verify migration state
        run: supabase migration list --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
